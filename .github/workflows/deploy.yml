# Déploiement automatique sur GitHub Pages à chaque modification de main.
# Copie aussi les fichiers d'adresses BAN des départements listés : servis
# depuis le même site, ils échappent au blocage CORS du serveur d'origine.

name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploiement:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Adresses BAN des départements embarqués
        run: |
          mkdir -p dist/ban-data
          for dept in 57; do
            curl -fsSL "https://adresse.data.gouv.fr/data/ban/adresses/latest/csv/adresses-${dept}.csv.gz" \
              -o "dist/ban-data/adresses-${dept}.csv.gz"
          done
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
